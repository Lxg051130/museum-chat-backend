<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>音频播放示例</title>
    <!-- 仅保留必要样式 -->
    <style>
        button {padding: 8px 16px; margin: 10px; cursor: pointer;}
        audio {margin: 10px;}
    </style>
</head>
<body>
    <!-- 音频播放控件 -->
    <audio id="audioPlayer" controls></audio>
    <!-- 触发播放的按钮 -->
    <button onclick="playAudio()">播放文物讲解音频</button>

    <script>
        // 核心播放函数
        async function playAudio() {
            try {
                // 1. 调用后端音频接口（传参：user_tag/relic_id/user_id）
                const response = await fetch("http://127.0.0.1:8000/api/v1/museum/get_audio", {
                    method: "POST",
                    headers: {"Content-Type": "application/json"},
                    body: JSON.stringify({
                        user_tag: "亲子家庭",  // 示例标签
                        relic_id: "OBJ089",    // 示例文物ID
                        user_id: "user123"     // 示例用户ID
                    })
                });

                // 2. 检查请求是否成功
                if (!response.ok) {
                    throw new Error(`请求失败：${response.status}`);
                }

                // 3. 将后端返回的音频流转为可播放的URL
                const audioBlob = await response.blob();
                const audioUrl = URL.createObjectURL(audioBlob);

                // 4. 播放音频
                const audioPlayer = document.getElementById("audioPlayer");
                audioPlayer.src = audioUrl;
                audioPlayer.play(); // 自动播放（部分浏览器需用户交互后才能触发）

            } catch (error) {
                alert(`播放失败：${error.message}`);
                console.error("错误详情：", error);
            }
        }
    </script>
</body>
</html>
